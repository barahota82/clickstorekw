<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phones - Click Company</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .catalog-filter-wrap {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .catalog-filter-label {
      font-size: 14px;
      color: #c9d4e7;
      font-weight: bold;
    }

    .catalog-filter {
      width: 100%;
      max-width: 260px;
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #ffffff;
      color: #111827;
      padding: 0 14px;
      font-size: 14px;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    .loading-state {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 24px;
      color: #c9d4e7;
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    .product-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 10px;
      color: #111827;
      min-height: 46px;
    }

    .desktop-only {
      display: inline-flex;
    }

    .mobile-only {
      display: none;
    }

    .registration-top-btn {
      color: #fff;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.2s ease;
      flex: 0 0 auto;
      font-weight: 700;
    }

    .registration-top-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    @media (max-width: 640px) {
      .catalog-filter {
        max-width: 100%;
      }

      .desktop-only {
        display: none !important;
      }

      .mobile-only {
        display: inline-flex !important;
      }
    }
  </style>
</head>
<body class="page-catalog">

  <header>
    <div class="container nav">
      <div class="brand">
        <div class="brand-static">
          <img src="/images/logo.png" alt="Click Company Logo" class="logo">
          <div class="brand-text">
            <h1>CLICK COMPANY</h1>
            <span id="loopText">You Can Depend on Us</span>
          </div>
        </div>
      </div>

      <nav class="nav-links">
        <div class="nav-row main-row">
          <a href="index.html" class="desktop-only">Home</a>
          <a href="phones.html" class="active">Phones</a>
          <a href="tablets.html">Tablets</a>
          <a href="laptops.html">Laptops</a>
          <a href="accessories.html">Accessories</a>
          <a href="index.html#hot-offers" class="hot-link">Hot Offers</a>

          <button class="registration-top-btn desktop-only" type="button" onclick="openAuthModal()">
          <span id="desktopAuthLabel">Login</span>
          </button>
          
          <button class="cart-btn" onclick="openCart()">
            Cart <span class="cart-badge" id="cart-count-top">0</span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <section class="page-head">
    <div class="container">
      <h2>Phones</h2>
      <p>Browse all phone offers.</p>

      <div class="catalog-filter-wrap">
        <label for="brandFilter" class="catalog-filter-label">Filter by Brand</label>
        <select id="brandFilter" class="catalog-filter" onchange="applyBrandFilter()">
          <option value="all">All Brands</option>
        </select>
      </div>
    </div>
  </section>

  <section class="container">
    <div class="products-grid" id="grid">
      <div class="loading-state" id="loading-state">Loading products...</div>
      <div class="empty-state" id="empty-state" style="display:none;">No products available yet.</div>
    </div>
  </section>

  <footer>
    <div class="container footer-box">
      <div>©️ 2017–<span id="year"></span> Click Company. All rights reserved.</div>
      <div>You Can Depend on Us</div>
    </div>
  </footer>

  <button class="floating-cart" onclick="openCart()">
    <span id="count">0</span>
  </button>

  <button id="whatsappBtn" class="floating-whatsapp" onclick="openWhatsAppDirect()">WhatsApp</button>

  <div class="cart-panel-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty-text">Your cart is empty.</div>
    </div>

    <div class="cart-footer">
      <button class="send-order-btn" type="button">Send Order via WhatsApp</button>
    </div>
  </aside>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      document.getElementById("year").textContent = new Date().getFullYear();
    });
  </script>

  <script>
    let productsData = [];
    let renderedBrands = new Set();

    function normalizeBrandValue(value) {
      const raw = String(value || "").trim();
      if (!raw) return "Other";

      return raw
        .replace(/\s*\/\s*/g, " / ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function extractNumber(value) {
      const raw = String(value || "").trim();
      const match = raw.match(/\d+(\.\d+)?/);
      return match ? match[0] : "";
    }

    function formatMonthly(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/kd/i.test(raw)) return raw;
      const number = extractNumber(raw);
      return number ? `${number} KD` : raw;
    }

    function formatDuration(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/month/i.test(raw)) return raw;
      const number = extractNumber(raw);
      return number ? `${number} Months` : raw;
    }

    function formatDownPayment(value) {
      const raw = String(value || "").trim();
      if (!raw) return "0 KD Down Payment";
      if (/down payment/i.test(raw)) return raw;
      if (/kd/i.test(raw)) return `${raw} Down Payment`;
      const number = extractNumber(raw);
      return number ? `${number} KD Down Payment` : "0 KD Down Payment";
    }

    function normalizeDevicesCount(value, title) {
      const raw = String(value || "").trim();
      if (raw) return raw;

      const cleanTitle = String(title || "").trim();
      if (!cleanTitle) return "1";

      const parts = cleanTitle.split(/\s*\+\s*|\s*\/\s*/).filter(Boolean);
      return String(parts.length || 1);
    }

    function calculateTotalPrice(product, monthlyText, durationText, downPaymentText) {
      if (product.total_price) {
        return formatMonthly(product.total_price);
      }

      const monthly = parseFloat(extractNumber(monthlyText)) || 0;
      const months = parseFloat(extractNumber(durationText)) || 0;
      const down = parseFloat(extractNumber(downPaymentText)) || 0;
      const total = (monthly * months) + down;

      return total ? `${total} KD` : "";
    }

    function populateBrandFilter() {
      const select = document.getElementById("brandFilter");
      if (!select) return;

      const currentValue = select.value || "all";
      const brands = Array.from(renderedBrands).sort((a, b) => a.localeCompare(b));

      select.innerHTML = '<option value="all">All Brands</option>';

      brands.forEach(brand => {
        const option = document.createElement("option");
        option.value = brand;
        option.textContent = brand;
        select.appendChild(option);
      });

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      } else {
        select.value = "all";
      }
    }

    function buildProductCard(product) {
      const imagePath = (product.image || "/images/logo.png").trim();
      const brandName = normalizeBrandValue(product.brand);

      const monthlyText = formatMonthly(product.monthly);
      const durationText = formatDuration(product.duration);
      const downPaymentText = formatDownPayment(product.down_payment);
      const titleText = product.title || "";
      const totalPriceText = calculateTotalPrice(product, monthlyText, durationText, downPaymentText);
      const devicesCountText = normalizeDevicesCount(product.devices_count, titleText);

      const card = document.createElement("div");
      card.className = "product-card";
      card.setAttribute("data-brand", brandName);

      card.innerHTML = `
        <div class="product-image">
          <img src="${imagePath}" alt="${titleText || "Product"}" loading="lazy">
        </div>

        <div class="product-body">
          <div class="product-title">${titleText}</div>

          <div class="row">
            <div>
              <div class="price">${monthlyText}</div>
              <div class="months">${durationText}</div>
              <div class="months">${downPaymentText}</div>
            </div>
            <button class="btn">+ Add To Cart</button>
          </div>
        </div>
      `;

      card.querySelector(".btn").onclick = () => {
        addToCart({
          title: titleText || "Product",
          image: imagePath,
          price: monthlyText,
          months: `${durationText} • ${downPaymentText}`,
          monthly: monthlyText,
          duration: durationText,
          down_payment: downPaymentText,
          total_price: totalPriceText,
          devices_count: devicesCountText
        });
      };

      return { card, brandName };
    }

    function applyBrandFilter() {
      const selectedBrand = document.getElementById("brandFilter")?.value || "all";
      const cards = document.querySelectorAll(".product-card[data-brand]");
      const empty = document.getElementById("empty-state");
      let visibleCount = 0;

      cards.forEach(card => {
        const cardBrand = card.getAttribute("data-brand") || "";
        const shouldShow = selectedBrand === "all" || cardBrand === selectedBrand;

        card.style.display = shouldShow ? "" : "none";
        if (shouldShow) visibleCount++;
      });

      if (empty) {
        if (visibleCount === 0) {
          empty.style.display = "";
          empty.textContent = "No products available for this brand.";
        } else {
          empty.style.display = "none";
        }
      }
    }

    function renderProducts(items) {
      const grid = document.getElementById("grid");
      const loading = document.getElementById("loading-state");
      const empty = document.getElementById("empty-state");

      document.querySelectorAll(".product-card").forEach(card => card.remove());
      renderedBrands = new Set();

      const visibleProducts = items
        .filter(item => item && item.available === true)
        .sort((a, b) => {
          const aBrandPriority = Number.isFinite(Number(a.brand_priority)) ? Number(a.brand_priority) : 9999;
          const bBrandPriority = Number.isFinite(Number(b.brand_priority)) ? Number(b.brand_priority) : 9999;
          if (aBrandPriority !== bBrandPriority) return aBrandPriority - bBrandPriority;

          const aPriority = Number.isFinite(Number(a.priority)) ? Number(a.priority) : 9999;
          const bPriority = Number.isFinite(Number(b.priority)) ? Number(b.priority) : 9999;
          if (aPriority !== bPriority) return aPriority - bPriority;

          return String(a.title || "").localeCompare(String(b.title || ""));
        });

      if (loading) loading.remove();

      if (!visibleProducts.length) {
        if (empty) {
          empty.style.display = "";
          empty.textContent = "No products available yet.";
        }
        populateBrandFilter();
        return;
      }

      visibleProducts.forEach(product => {
        const { card, brandName } = buildProductCard(product);
        grid.appendChild(card);
        renderedBrands.add(brandName);
      });

      if (empty) empty.style.display = "none";

      populateBrandFilter();
      applyBrandFilter();
    }

    async function load() {
      try {
        const res = await fetch("/products/phones/data.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load phones data.json");

        const files = await res.json();
        if (!Array.isArray(files)) throw new Error("phones data.json must be an array");

        const productResults = await Promise.all(
          files.map(async (file) => {
            try {
              const r = await fetch(`/products/phones/${file}`, { cache: "no-store" });
              if (!r.ok) return null;
              return await r.json();
            } catch (e) {
              console.error("Failed to load phone file:", file, e);
              return null;
            }
          })
        );

        productsData = productResults.filter(Boolean);
        renderProducts(productsData);
      } catch (e) {
        console.error("Failed to load phones data:", e);

        const loading = document.getElementById("loading-state");
        const empty = document.getElementById("empty-state");

        if (loading) loading.remove();
        if (empty) {
          empty.style.display = "";
          empty.textContent = "Failed to load products.";
        }
      }
    }

    load();
  </script>

  <script>
    const texts = [
      "You Can Depend on Us",
      "Best Deals in Kuwait",
      "Easy Monthly Installments",
      "Fast Delivery"
    ];

    let i = 0;
    const el = document.getElementById("loopText");

    setInterval(() => {
      if (!el) return;
      el.style.opacity = 0;

      setTimeout(() => {
        i = (i + 1) % texts.length;
        el.textContent = texts[i];
        el.style.opacity = 1;
      }, 400);
    }, 3000);
  </script>
