<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Store KW</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #0a2a5e, #1c4ea1);
    color: white;
    text-align: center;
}

header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.hero {
    padding: 30px;
}

.hero h1 {
    font-size: 40px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    color: black;
    border-radius: 10px;
    padding: 15px;
}

.card img {
    width: 100%;
}

.price {
    color: green;
    font-size: 20px;
}

.btn {
    background: #25D366;
    color: white;
    padding: 10px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
}
</style>

</head>

<body>

<header>CLICK STORE KW</header>

<div class="hero">
<h1>Buy Now, Pay Later</h1>
<p>Easy Installments - Fast Approval</p>
</div>

<div class="products">

<div class="card">
<h3>Samsung A16</h3>
<p>10 KD Monthly</p>
<a class="btn" href="https://wa.me/96567680877">Order Now</a>
</div>

<div class="card">
<h3>Honor X5C</h3>
<p>10 KD Monthly</p>
<a class="btn" href="https://wa.me/96567680877">Order Now</a>
</div>

</div>

</div>

</body>
</html>
