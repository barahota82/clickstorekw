<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tablets - Click Company</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
--text:#ffffff;
--muted:#c9d4e7;
--dark-text:#111827;
--primary:#2563eb;
--accent:#22c55e;
--accent-dark:#16a34a;
--border:rgba(255,255,255,0.08);
--shadow:0 12px 30px rgba(0,0,0,0.25);
--card:#ffffff;
}

body{
font-family:Arial;
background: radial-gradient(circle at top,#1e3a8a 0%,#0c1830 40%,#050b18 100%);
color:var(--text);
overflow-x:hidden;
}

/* ✨ تأثير الإضاءة */
body::before{
content:"";
position:fixed;
top:-20%;left:-20%;
width:140%;height:140%;
background:
radial-gradient(circle at 30% 20%, rgba(59,130,246,.25), transparent 40%),
radial-gradient(circle at 70% 30%, rgba(34,197,94,.15), transparent 40%);
animation:moveLight 10s linear infinite;
z-index:0;
}

@keyframes moveLight{
0%{transform:translate(0,0)}
50%{transform:translate(40px,30px)}
100%{transform:translate(0,0)}
}

.container,header,section,footer{position:relative;z-index:1;}
.container{width:min(1180px,92%);margin:auto;}

header{
position:sticky;top:0;
background:rgba(8,17,31,.85);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
}

.nav{
display:flex;justify-content:space-between;align-items:center;
padding:10px 0;flex-wrap:wrap;
}

.brand a{display:flex;align-items:center;gap:12px;color:#fff;}

.logo{width:140px;object-fit:contain;}

.brand-text h1{font-size:22px;}
.brand-text span{font-size:12px;color:var(--muted);}

.nav-links{display:flex;flex-wrap:wrap;gap:6px;width:100%;}

.nav-links a{
color:#fff;font-size:13px;padding:8px 10px;border-radius:10px;
}

.nav-links a.active{background:var(--primary);}

.page-head{padding:24px 0;}
.page-head h2{font-size:34px;}
.page-head p{color:var(--muted);}

.products-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
padding:20px 0;
}

.product-card{
background:#fff;color:#111;
border-radius:24px;
overflow:hidden;
box-shadow:var(--shadow);
}

.product-image{
height:420px;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
}

.product-image img{
width:100%;
height:100%;
object-fit:contain;
}

.product-body{padding:18px;}

.row{
display:flex;
justify-content:space-between;
align-items:flex-end;
}

.price{
font-size:30px;
color:var(--primary);
font-weight:bold;
}

.btn{
background:var(--accent);
color:#fff;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{background:var(--accent-dark);}

.floating-whatsapp{
position:fixed;
right:18px;
bottom:18px;
background:#25D366;
color:#fff;
padding:14px 22px;
border-radius:999px;
font-weight:bold;
z-index:999;
}
</style>
</head>

<body>

<header>
<div class="container nav">
<div class="brand">
<a href="/">
<img src="/images/logo.png" class="logo">
<div class="brand-text">
<h1>CLICK COMPANY</h1>
<span>Phones • Tablets • Laptops • Accessories</span>
</div>
</a>
</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/phones.html">Phones</a>
<a href="/tablets.html" class="active">Tablets</a>
<a href="/laptops.html">Laptops</a>
<a href="/accessories.html">Accessories</a>
</div>
</div>
</header>

<section class="page-head">
<div class="container">
<h2>Tablets</h2>
<p>Browse all tablet offers.</p>
</div>
</section>

<section class="container">
<div class="products-grid" id="grid"></div>
</section>

<a id="whatsappBtn" class="floating-whatsapp" href="#" target="_blank">
WhatsApp
</a>

<script>
let cart=[];

async function load(){
const paths=["/products/tablets/ipadair.md"];
const grid=document.getElementById("grid");

for(const p of paths){
try{
const t=await fetch(p).then(r=>r.text());
const d={};
t.split("\n").forEach(l=>{
if(l.includes(":")){
const [k,...rest]=l.split(":");
d[k.trim()]=rest.join(":").trim().replace(/"/g,"");
}
});

if(d.available==="false")continue;

const image=d.image||"/images/logo.png";

const card=document.createElement("div");
card.className="product-card";

card.innerHTML=`
<div class="product-image">
<img src="${image}">
</div>

<div class="product-body">
<div class="row">
<div>
<div class="price">${d.price||""}</div>
<div>${d.months||""}</div>
</div>
<button class="btn">+ Add</button>
</div>
</div>
`;

grid.appendChild(card);

}catch(e){}
}
}

load();

/* واتساب */
(function(){
const phone="96567680877";
const msg=`Welcome to Click Company 👋

👤 Shella - Sales Representative

How can I assist you today?`;

document.getElementById("whatsappBtn").href=
`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
})();
</script>

</body>
</html>
