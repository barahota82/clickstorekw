<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablets - Click Company</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .catalog-filter-wrap {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .catalog-filter-label {
      font-size: 14px;
      color: #c9d4e7;
      font-weight: bold;
    }

    .catalog-filter {
      width: 100%;
      max-width: 260px;
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #ffffff;
      color: #111827;
      padding: 0 14px;
      font-size: 14px;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    .loading-state {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 24px;
      color: #c9d4e7;
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    .product-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 10px;
      color: #111827;
      min-height: 46px;
    }
  </style>
</head>
<body class="page-catalog">

<header>
  <div class="container nav">
    <div class="brand">
      <div class="brand-static">
        <img src="/images/logo.png" class="logo">
        <div class="brand-text">
          <h1>CLICK COMPANY</h1>
          <span id="loopText">You Can Depend on Us</span>
        </div>
      </div>
    </div>

    <nav class="nav-links">
      <div class="nav-row main-row">
        <a href="index.html">Home</a>
        <a href="phones.html">Phones</a>
        <a href="tablets.html" class="active">Tablets</a>
        <a href="laptops.html">Laptops</a>
        <a href="accessories.html">Accessories</a>

        <button class="cart-btn" onclick="openCart()">
          Cart <span class="cart-badge" id="cart-count-top">0</span>
        </button>
      </div>

      <div class="nav-row hot-row">
        <a href="index.html#hot-offers" class="hot-link">Hot Offers</a>
      </div>
    </nav>
  </div>
</header>

<section class="page-head">
  <div class="container">
    <h2>Tablets</h2>
    <p>Browse all tablet offers.</p>

    <div class="catalog-filter-wrap">
      <label class="catalog-filter-label">Filter by Brand</label>
      <select id="brandFilter" class="catalog-filter" onchange="applyBrandFilter()">
        <option value="all">All Brands</option>
      </select>
    </div>
  </div>
</section>

<section class="container">
  <div class="products-grid" id="grid">
    <div class="loading-state" id="loading-state">Loading products...</div>
    <div class="empty-state" id="empty-state" style="display:none;">No products available yet.</div>
  </div>
</section>

<footer>
  <div class="container footer-box">
    <div>©️ 2017–<span id="year"></span> Click Company</div>
    <div>You Can Depend on Us</div>
  </div>
</footer>

<script src="/js/cart.js"></script>

<script>
let renderedBrands = new Set();

/* ================= FORMAT FIX ================= */

function extractNumber(v){
  const m = String(v||"").match(/\d+/);
  return m ? m[0] : "";
}

function formatMonthly(v){
  if(!v) return "";
  if(/kd/i.test(v)) return v;
  return extractNumber(v) + " KD";
}

function formatDuration(v){
  if(!v) return "";
  if(/month/i.test(v)) return v;
  return extractNumber(v) + " Months";
}

function formatDown(v){
  if(!v) return "0 KD Down Payment";
  if(/down/i.test(v)) return v;
  return extractNumber(v) + " KD Down Payment";
}

/* ================= BRAND ================= */

function normalizeBrand(v){
  if(!v) return "Other";
  return v.replace(/\b\w/g,c=>c.toUpperCase());
}

function populateBrandFilter(){
  const select=document.getElementById("brandFilter");
  const brands=[...renderedBrands].sort();

  select.innerHTML='<option value="all">All Brands</option>';

  brands.forEach(b=>{
    const o=document.createElement("option");
    o.value=b;
    o.textContent=b;
    select.appendChild(o);
  });
}

/* ================= CARD ================= */

function buildCard(p){
  const brand=normalizeBrand(p.brand);

  const card=document.createElement("div");
  card.className="product-card";
  card.setAttribute("data-brand",brand);

  card.innerHTML=`
    <div class="product-image">
      <img src="${p.image || '/images/logo.png'}">
    </div>

    <div class="product-body">
      <div class="product-title">${p.title || ""}</div>

      <div class="row">
        <div>
          <div class="price">${formatMonthly(p.monthly)}</div>
          <div class="months">${formatDuration(p.duration)}</div>
          <div class="months">${formatDown(p.down_payment)}</div>
        </div>
        <button class="btn">+ Add To Cart</button>
      </div>
    </div>
  `;

  card.querySelector(".btn").onclick=()=>{
    addToCart({
      title:p.title,
      price:formatMonthly(p.monthly),
      months:formatDuration(p.duration)+" • "+formatDown(p.down_payment),
      image:p.image
    });
  };

  return {card,brand};
}

/* ================= FILTER ================= */

function applyBrandFilter(){
  const val=document.getElementById("brandFilter").value;
  let visible=0;

  document.querySelectorAll(".product-card").forEach(c=>{
    const show = val==="all" || c.dataset.brand===val;
    c.style.display=show?"":"none";
    if(show) visible++;
  });

  const empty=document.getElementById("empty-state");
  empty.style.display = visible? "none":"block";
}

/* ================= LOAD ================= */

async function load(){
  try{
    const res=await fetch("/products/tablets/data.json",{cache:"no-store"});
    const files=await res.json();

    const results=await Promise.all(
      files.map(f=>fetch(`/products/tablets/${f}`).then(r=>r.json()).catch(()=>null))
    );

    const data=results.filter(Boolean).filter(p=>p.available);

    document.getElementById("loading-state").remove();

    if(!data.length){
      document.getElementById("empty-state").style.display="block";
      return;
    }

    data.forEach(p=>{
      const {card,brand}=buildCard(p);
      document.getElementById("grid").appendChild(card);
      renderedBrands.add(brand);
    });

    populateBrandFilter();
    applyBrandFilter();

  }catch(e){
    console.error(e);
  }
}

load();
</script>

</body>
</html>
