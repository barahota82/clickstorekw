<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablets - Click Company</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text: #ffffff;
      --muted: #c9d4e7;
      --dark-text: #111827;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --hot-bg: #f59e0b;
      --hot-text: #ffffff;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.25);
      --card: #ffffff;
    }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #17346f 0%, #0c1830 35%, #08111f 100%);
      color: var(--text);
      line-height: 1.5;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: min(1180px, 92%);
      margin: auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(14px);
      background: rgba(8, 17, 31, 0.82);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    .brand a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
    }

    .logo {
      height: 48px;
      display: block;
      filter: brightness(1.35);
    }

    .brand-text h1 {
      font-size: 22px;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .brand-text span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .nav-row.main-row {
      justify-content: flex-start;
    }

    .nav-row.hot-row {
      justify-content: flex-start;
    }

    .nav-links a,
    .cart-btn {
      color: #fff;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px;
      background: transparent;
      border: 0;
      cursor: pointer;
      transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .nav-links a:hover,
    .cart-btn:hover {
      background: rgba(255,255,255,0.06);
    }

    .nav-links a.active {
      background: var(--primary);
      color: #fff;
      font-weight: bold;
    }

    .nav-links a.hot-link {
      background: rgba(245, 158, 11, 0.16);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.28);
      font-weight: bold;
    }

    .nav-links a.hot-link:hover {
      background: var(--hot-bg);
      color: var(--hot-text);
      border-color: var(--hot-bg);
    }

    .cart-btn {
      display: none;
    }

    .cart-badge {
      display: inline-flex;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: bold;
      margin-left: 6px;
      padding: 0 6px;
    }

    .page-head {
      padding: 24px 0 12px;
    }

    .page-head h2 {
      font-size: 34px;
      margin-bottom: 6px;
    }

    .page-head p {
      color: var(--muted);
      font-size: 15px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 20px 0 30px;
    }

    .product-card {
      background: var(--card);
      color: var(--dark-text);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      width: 100%;
    }

    .product-image {
      width: 100%;
      height: 420px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid #eef2f7;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .product-body {
      padding: 18px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
    }

    .price {
      font-size: 32px;
      color: var(--primary);
      font-weight: bold;
      line-height: 1;
      margin-bottom: 6px;
    }

    .months {
      font-size: 14px;
      color: #666;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      padding: 14px 20px;
      border: none;
      border-radius: 16px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
      min-width: 170px;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: var(--accent-dark);
    }

    .empty-state {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    footer {
      padding: 36px 0 90px;
      color: var(--muted);
    }

    .footer-box {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .floating-cart {
      position: fixed;
      left: 18px;
      bottom: 18px;
      background: #2f6df1;
      color: #fff;
      border-radius: 999px;
      height: 56px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,.3);
      z-index: 1000;
      border: 0;
      cursor: pointer;
      font-size: 22px;
    }

    .floating-cart span {
      font-size: 17px;
    }

    .floating-whatsapp {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #25D366;
      color: #fff;
      height: 56px;
      padding: 0 22px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,.3);
      z-index: 1000;
    }

    .cart-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1200;
      display: none;
    }

    .cart-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: min(92vw, 380px);
      height: 100vh;
      background: #fff;
      color: #111827;
      z-index: 1201;
      box-shadow: -10px 0 30px rgba(0,0,0,0.25);
      transition: right 0.28s ease;
      display: flex;
      flex-direction: column;
    }

    .cart-panel.open {
      right: 0;
    }

    .cart-panel-overlay.open {
      display: block;
    }

    .cart-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .cart-header h3 {
      font-size: 22px;
    }

    .cart-close {
      background: #f3f4f6;
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      font-size: 18px;
      cursor: pointer;
    }

    .cart-items {
      flex: 1;
      overflow: auto;
      padding: 14px 18px;
      display: grid;
      gap: 12px;
    }

    .cart-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .cart-item img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #eef2f7;
      padding: 6px;
    }

    .cart-item-title {
      font-size: 14px;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .cart-item-meta {
      font-size: 12px;
      color: #6b7280;
    }

    .cart-remove {
      background: #fee2e2;
      color: #b91c1c;
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .cart-footer {
      border-top: 1px solid #e5e7eb;
      padding: 14px 18px 18px;
      display: grid;
      gap: 10px;
    }

    .send-order-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      background: #25D366;
      color: white;
      font-weight: bold;
      border: 0;
      cursor: pointer;
    }

    .cart-empty-text {
      color: #6b7280;
      text-align: center;
      padding: 28px 10px;
    }

    @media (min-width: 900px) {
      .nav {
        flex-wrap: nowrap;
      }

      .nav-links {
        width: auto;
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }

      .nav-row {
        flex-wrap: nowrap;
        gap: 8px;
      }

      .nav-row.hot-row {
        order: 2;
      }

      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .product-image {
        height: 360px;
      }

      .cart-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
  .nav {
    align-items: flex-start;
    flex-direction: column;
  }

  .page-head {
    padding: 18px 0 10px;
  }

  .cart-panel {
    top: auto;
    bottom: -100vh;
    right: 0;
    width: 100%;
    height: 75vh;
    border-radius: 20px 20px 0 0;
  }

  .cart-panel.open {
    bottom: 0;
  }
}

      .page-head h2 {
        font-size: 28px;
      }

      .logo {
        height: 42px;
      }

      .brand-text span {
        white-space: normal;
      }

      .nav-links a,
      .cart-btn {
        font-size: 12px;
        padding: 7px 8px;
      }

      .product-image {
        height: 340px;
      }

      .floating-cart {
        left: 14px;
        bottom: 14px;
        height: 52px;
      }

      .floating-whatsapp {
        right: 14px;
        bottom: 14px;
        height: 52px;
      }

      .btn {
        min-width: 140px;
        padding: 13px 16px;
        font-size: 16px;
      }

      .price {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="container nav">
      <div class="brand">
        <a href="/">
          <img src="/images/logo.png" alt="Click Company Logo" class="logo">
          <div class="brand-text">
            <h1>CLICK COMPANY</h1>
            <span>Phones • Tablets • Laptops • Accessories</span>
          </div>
        </a>
      </div>

      <nav class="nav-links">
        <div class="nav-row main-row">
          <a href="/">Home</a>
          <a href="/phones.html">Phones</a>
          <a href="/tablets.html" class="active">Tablets</a>
          <a href="/laptops.html">Laptops</a>
          <a href="/accessories.html">Accessories</a>
          <button class="cart-btn" onclick="openCart()">Cart <span class="cart-badge" id="cart-count-top">0</span></button>
        </div>

        <div class="nav-row hot-row">
          <a href="/#hot-offers" class="hot-link">Hot Offers</a>
        </div>
      </nav>
    </div>
  </header>

  <section class="page-head">
    <div class="container">
      <h2>Tablets</h2>
      <p>Browse all tablet offers.</p>
    </div>
  </section>

  <section class="container">
    <div class="products-grid" id="grid">
      <div class="empty-state" id="empty-state">No products available yet.</div>
    </div>
  </section>

  <footer>
    <div class="container footer-box">
      <div>© 2026 Click Company</div>
      <div>You Can Depend on Us</div>
    </div>
  </footer>

  <button class="floating-cart" onclick="openCart()">🛒 <span id="count">0</span></button>
  <a id="whatsappBtn" class="floating-whatsapp" href="#" target="_blank">
  WhatsApp
</a>

  <div class="cart-panel-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty-text">Your cart is empty.</div>
    </div>

    <div class="cart-footer">
      <button class="send-order-btn" onclick="sendOrderWhatsApp()">Send Order via WhatsApp</button>
    </div>
  </aside>

  <script>
    let cart = [];

    function update() {
      const count = cart.length;
      document.getElementById("count").innerText = count;
      const topCount = document.getElementById("cart-count-top");
      if (topCount) topCount.innerText = count;

      const cartItems = document.getElementById("cartItems");

      if (!count) {
        cartItems.innerHTML = '<div class="cart-empty-text">Your cart is empty.</div>';
        return;
      }

      cartItems.innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <img src="${item.image}" alt="Product">
          <div>
            <div class="cart-item-title">${item.title || "Product"}</div>
            <div class="cart-item-meta">${item.price}</div>
            <div class="cart-item-meta">${item.months}</div>
          </div>
          <button class="cart-remove" onclick="removeFromCart(${index})">X</button>
        </div>
      `).join("");
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      update();
    }

    function openCart() {
      document.getElementById("cartPanel").classList.add("open");
      document.getElementById("cartOverlay").classList.add("open");
    }

    function closeCart() {
      document.getElementById("cartPanel").classList.remove("open");
      document.getElementById("cartOverlay").classList.remove("open");
    }

    function sendOrderWhatsApp() {
      if (!cart.length) return;

      const baseURL = window.location.origin;

      const lines = cart.map((item, i) => {
        let imageURL = item.image || "";
        if (imageURL.startsWith("/")) imageURL = baseURL + imageURL;

        return `🔹 Product ${i + 1}
📱 ${item.title || "Product"}
💰 ${item.price}
📆 ${item.months}
📸 View Product Image:
${imageURL}`;
      });

      const msg = `Welcome to Click Company 👋

👤 Shella - Sales Representative

🛒 New Order

${lines.join("\n\n")}

📍 Please confirm availability & total price.`;

      fetch("/settings/whatsapp.md")
  .then(res => res.text())
  .then(text => {
    const data = {};
    text.split("\n").forEach(line => {
      if (line.includes(":")) {
        const [key, ...rest] = line.split(":");
        data[key.trim()] = rest.join(":").trim().replace(/"/g, "");
      }
    });

    const phone = "965" + (data.phone || "");
    window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
  })
  .catch(() => {
    window.open(`https://wa.me/96567680877?text=${encoded}`, "_blank");
  });
    }

    async function get(path) {
      const r = await fetch(path);
      return await r.text();
    }

    function parse(t) {
      const d = {};
      t.split("\n").forEach(l => {
        if (l.includes(":")) {
          const [k, ...rest] = l.split(":");
          d[k.trim()] = rest.join(":").trim().replace(/"/g, "");
        }
      });
      return d;
    }

    async function load() {
      const paths = [
        "/products/tablets/ipadair.md"
      ];

      const grid = document.getElementById("grid");
      let rendered = 0;

      for (const p of paths) {
        try {
          const t = await get(p);
          const d = parse(t);

          if (String(d.available || "").toLowerCase() === "false") continue;

          const imagePath = (d.image || "/images/logo.png").trim();

          const card = document.createElement("div");
          card.className = "product-card";

          card.innerHTML = `
            <div class="product-image">
              <img src="${imagePath}" alt="Product">
            </div>

            <div class="product-body">
              <div class="row">
                <div>
                  <div class="price">${d.price || ""}</div>
                  <div class="months">${d.months || ""}</div>
                </div>
                <button class="btn">+ Add</button>
              </div>
            </div>
          `;

          card.querySelector(".btn").onclick = () => {
            cart.push({
              title: d.title || "Product",
              price: d.price || "",
              months: d.months || "",
              image: imagePath
            });
            update();
          };

          grid.appendChild(card);
          rendered++;
        } catch (e) {}
      }

      if (rendered) {
        const empty = document.getElementById("empty-state");
        if (empty) empty.remove();
      }
    }

    update();
    load();
  </script>

</body>
</html>
