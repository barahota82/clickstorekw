<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Products - Click Company</title>
  <link rel="stylesheet" href="/css/style.css" />

</head>
<body class="page-all-products">
  <header>
    <div class="container nav">

      <div class="brand">
        <div class="brand-static">
          <img src="/images/logo.png" alt="Click Company Logo" class="logo">
          <div class="brand-text">
            <h1>CLICK COMPANY</h1>
            <span id="loopText">You Can Depend on Us</span>
          </div>
        </div>
      </div>

      <nav class="nav-links">
        <div class="nav-row main-row">
          <a href="index.html">Home</a>
          <a href="phones.html">Phones</a>
          <a href="tablets.html">Tablets</a>
          <a href="laptops.html">Laptops</a>
          <a href="accessories.html">Accessories</a>

          <button class="cart-btn" onclick="openCart()">
            Cart <span class="cart-badge" id="cart-count-top">0</span>
          </button>
        </div>

        <div class="nav-row hot-row">
          <a href="index.html#hot-offers" class="hot-link">Hot Offers</a>
        </div>
      </nav>

    </div>
  </header>

  <section class="page-head">
    <div class="container">
      <h2>All Products</h2>
      <p>Choose from all categories and add what you want to your cart.</p>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="filterProducts('all', this)">All</button>
        <button class="filter-btn" data-filter="phones" onclick="filterProducts('phones', this)">Phones</button>
        <button class="filter-btn" data-filter="tablets" onclick="filterProducts('tablets', this)">Tablets</button>
        <button class="filter-btn" data-filter="laptops" onclick="filterProducts('laptops', this)">Laptops</button>
        <button class="filter-btn" data-filter="accessories" onclick="filterProducts('accessories', this)">Accessories</button>
      </div>
    </div>
  </section>

  <section class="container">
    <div class="products-grid" id="grid">
      <div class="empty-state" id="empty-state">No products available yet.</div>
    </div>
  </section>

  <footer>
    <div class="container footer-box">
      <div>
        ©️ 2017–<span id="year"></span> Click Company. All rights reserved.
      </div>
      <div>You Can Depend on Us</div>
    </div>
  </footer>

  <button class="floating-cart" onclick="openCart()">🛒 <span id="count">0</span></button>

  <a id="whatsappBtn" class="floating-whatsapp" href="#" target="_blank">
    WhatsApp
  </a>

  <div class="cart-panel-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty-text">Your cart is empty.</div>
    </div>

    <div class="cart-footer">
      <button class="send-order-btn" onclick="sendOrderWhatsApp()">Send Order via WhatsApp</button>
    </div>
  </aside>

  <script>
    window.addEventListener("DOMContentLoaded", function() {
      document.getElementById("year").textContent = new Date().getFullYear();
    });
  </script>

  <script src="/js/cart.js"></script>

  <script>
    async function get(path) {
      const r = await fetch(path);
      return await r.text();
    }

    function parse(t) {
      const d = {};
      t.split("\n").forEach(l => {
        if (l.includes(":")) {
          const [k, ...rest] = l.split(":");
          d[k.trim()] = rest.join(":").trim().replace(/"/g, "");
        }
      });
      return d;
    }

    function filterProducts(category, buttonEl) {
      const cards = document.querySelectorAll(".product-card[data-category]");

      cards.forEach(card => {
        if (category === "all") {
          card.style.display = "block";
        } else {
          card.style.display = card.getAttribute("data-category") === category ? "block" : "none";
        }
      });

      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
      if (buttonEl) buttonEl.classList.add("active");
    }

    async function load() {
      const paths = [
        { path: "/products/phones/iphone15pro.txt", category: "phones" },
        { path: "/products/tablets/ipadair.txt", category: "tablets" },
        { path: "/products/laptops/macbookairm2.txt", category: "laptops" },
        { path: "/products/accessories/airpodspro.txt", category: "accessories" }
      ];

      const grid = document.getElementById("grid");
      let rendered = 0;

      for (const item of paths) {
        try {
          const t = await get(item.path);
          const d = parse(t);

          if (String(d.available || "").toLowerCase() === "false") continue;

          const imagePath = (d.image || "/images/logo.png").trim();

          const card = document.createElement("div");
          card.className = "product-card";
          card.setAttribute("data-category", item.category);

          card.innerHTML = `
            <div class="product-image">
              <img src="${imagePath}" alt="Product">
            </div>

            <div class="product-body">
              <div class="row">
                <div>
                  <div class="price">${d.price || ""}</div>
                  <div class="months">${d.months || ""}</div>
                </div>
                <button class="btn">+ Add</button>
              </div>
            </div>
          `;

          card.querySelector(".btn").onclick = () => {
            addToCart({
              title: d.title || "Product",
              price: d.price || "",
              months: d.months || "",
              image: imagePath
            });
          };

          grid.appendChild(card);
          rendered++;
        } catch (e) {}
      }

      if (rendered) {
        const empty = document.getElementById("empty-state");
        if (empty) empty.remove();
      }
    }

    load();
  </script>

  <script>
    const texts = [
      "You Can Depend on Us",
      "Best Deals in Kuwait",
      "Easy Monthly Installments",
      "Fast Delivery"
    ];

    let i = 0;
    const el = document.getElementById("loopText");

    setInterval(() => {
      if (!el) return;

      el.style.opacity = 0;

      setTimeout(() => {
        i = (i + 1) % texts.length;
        el.textContent = texts[i];
        el.style.opacity = 1;
      }, 400);
    }, 3000);
  </script>

</body>
</html>
