<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Products - Click Company</title>
  <link rel="stylesheet" href="/css/style.css"/>

  <style>
    .catalog-filter-wrap { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
    .catalog-filter-label { font-size:13px; color:#c9d4e7; font-weight:bold; }

    .catalog-filter {
      max-width:260px; height:42px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.15);
      background:#fff; color:#111827;
      padding:0 12px; font-weight:bold; cursor:pointer;
    }

    .loading-state {
      border:1px dashed rgba(255,255,255,0.18);
      border-radius:18px;
      padding:24px;
      text-align:center;
      color:#c9d4e7;
    }

    .product-title {
      font-size:15px;
      font-weight:700;
      margin-bottom:10px;
    }
  </style>
</head>

<body class="page-all-products">

<header>
  <div class="container nav">
    <div class="brand">
      <img src="/images/logo.png" class="logo">
      <div>
        <h1>CLICK COMPANY</h1>
        <span id="loopText">You Can Depend on Us</span>
      </div>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="phones.html">Phones</a>
      <a href="tablets.html">Tablets</a>
      <a href="laptops.html">Laptops</a>
      <a href="accessories.html">Accessories</a>
    </nav>
  </div>
</header>

<section class="container">
  <h2>All Products</h2>

  <div>
    <button onclick="filterProducts('all',this)" class="filter-btn active">All</button>
    <button onclick="filterProducts('phones',this)" class="filter-btn">Phones</button>
    <button onclick="filterProducts('tablets',this)" class="filter-btn">Tablets</button>
    <button onclick="filterProducts('laptops',this)" class="filter-btn">Laptops</button>
    <button onclick="filterProducts('accessories',this)" class="filter-btn">Accessories</button>
  </div>

  <div class="catalog-filter-wrap">
    <label class="catalog-filter-label">Filter by Brand</label>
    <select id="brandFilter" class="catalog-filter" onchange="applyAllFilters()">
      <option value="all">All Brands</option>
    </select>
  </div>

  <div id="grid">
    <div class="loading-state" id="loading-state">Loading...</div>
    <div id="empty-state" style="display:none;">No products</div>
  </div>
</section>

<script src="/js/cart.js"></script>

<script>
let allProducts = [];
let currentCategory = "all";
let brands = new Set();

/* ===== FORMAT FIX ===== */

function num(v){ const m=String(v||"").match(/\d+/); return m?m[0]:""; }

function monthly(v){ if(!v) return ""; return /kd/i.test(v)?v: num(v)+" KD"; }
function duration(v){ if(!v) return ""; return /month/i.test(v)?v: num(v)+" Months"; }
function down(v){ if(!v) return "0 KD Down Payment"; return /down/i.test(v)?v: num(v)+" KD Down Payment"; }

/* ===== BUILD CARD ===== */

function card(p){
  const div=document.createElement("div");
  const brand=(p.brand||"Other").toUpperCase();

  div.className="product-card";
  div.dataset.category=p.category;
  div.dataset.brand=brand;

  div.innerHTML=`
    <div><img src="${p.image||'/images/logo.png'}"></div>
    <div>
      <div class="product-title">${p.title||""}</div>
      <div>${monthly(p.monthly)}</div>
      <div>${duration(p.duration)}</div>
      <div>${down(p.down_payment)}</div>
      <button>Add</button>
    </div>
  `;

  div.querySelector("button").onclick=()=>{
    addToCart({
      title:p.title,
      price:monthly(p.monthly),
      months:duration(p.duration)+" • "+down(p.down_payment),
      image:p.image
    });
  };

  return div;
}

/* ===== FILTER ===== */

function filterProducts(cat,btn){
  currentCategory=cat;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  applyAllFilters();
}

function applyAllFilters(){
  const selectedBrand=document.getElementById("brandFilter").value;
  let visible=0;
  brands=new Set();

  document.querySelectorAll(".product-card").forEach(c=>{
    const matchCat=currentCategory==="all"||c.dataset.category===currentCategory;
    if(matchCat) brands.add(c.dataset.brand);
  });

  const select=document.getElementById("brandFilter");
  select.innerHTML='<option value="all">All Brands</option>';
  [...brands].sort().forEach(b=>{
    const o=document.createElement("option");
    o.value=b; o.textContent=b;
    select.appendChild(o);
  });

  document.querySelectorAll(".product-card").forEach(c=>{
    const show =
      (currentCategory==="all"||c.dataset.category===currentCategory) &&
      (selectedBrand==="all"||c.dataset.brand===selectedBrand);

    c.style.display=show?"block":"none";
    if(show) visible++;
  });

  document.getElementById("empty-state").style.display = visible? "none":"block";
}

/* ===== LOAD ===== */

async function loadCategory(name){
  try{
    const files=await fetch(`/products/${name}/data.json`).then(r=>r.json());

    const items=await Promise.all(
      files.map(f=>fetch(`/products/${name}/${f}`).then(r=>r.json()).catch(()=>null))
    );

    return items.filter(Boolean).map(i=>({...i,category:name}));

  }catch{ return []; }
}

async function load(){
  const cats=["phones","tablets","laptops","accessories"];

  const results=await Promise.all(cats.map(loadCategory));
  allProducts=results.flat();

  document.getElementById("loading-state").remove();

  if(!allProducts.length){
    document.getElementById("empty-state").style.display="block";
    return;
  }

  allProducts.forEach(p=>{
    if(p.available) document.getElementById("grid").appendChild(card(p));
  });

  applyAllFilters();
}

load();
</script>

</body>
</html>
