<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Products - Click Company</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .catalog-filter-wrap {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .catalog-filter-label {
      font-size: 13px;
      color: #c9d4e7;
      font-weight: bold;
    }

    .catalog-filter {
      max-width: 260px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #fff;
      color: #111827;
      padding: 0 12px;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .catalog-filter {
        max-width: 100%;
      }
    }
  </style>
</head>
<body class="page-all-products">
  <header>
    <div class="container nav">

      <div class="brand">
        <div class="brand-static">
          <img src="/images/logo.png" alt="Click Company Logo" class="logo">
          <div class="brand-text">
            <h1>CLICK COMPANY</h1>
            <span id="loopText">You Can Depend on Us</span>
          </div>
        </div>
      </div>

      <nav class="nav-links">
        <div class="nav-row main-row">
          <a href="index.html">Home</a>
          <a href="phones.html">Phones</a>
          <a href="tablets.html">Tablets</a>
          <a href="laptops.html">Laptops</a>
          <a href="accessories.html">Accessories</a>

          <button class="cart-btn" onclick="openCart()">
            Cart <span class="cart-badge" id="cart-count-top">0</span>
          </button>
        </div>

        <div class="nav-row hot-row">
          <a href="index.html#hot-offers" class="hot-link">Hot Offers</a>
        </div>
      </nav>

    </div>
  </header>

  <section class="page-head">
    <div class="container">
      <h2>All Products</h2>
      <p>Choose from all categories and add what you want to your cart.</p>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="filterProducts('all', this)">All</button>
        <button class="filter-btn" data-filter="phones" onclick="filterProducts('phones', this)">Phones</button>
        <button class="filter-btn" data-filter="tablets" onclick="filterProducts('tablets', this)">Tablets</button>
        <button class="filter-btn" data-filter="laptops" onclick="filterProducts('laptops', this)">Laptops</button>
        <button class="filter-btn" data-filter="accessories" onclick="filterProducts('accessories', this)">Accessories</button>
      </div>

      <div class="catalog-filter-wrap">
        <label for="brandFilter" class="catalog-filter-label">Filter by Brand</label>
        <select id="brandFilter" class="catalog-filter" onchange="applyBrandFilter()">
          <option value="all">All Brands</option>
        </select>
      </div>
    </div>
  </section>

  <section class="container">
    <div class="products-grid" id="grid">
      <div class="empty-state" id="empty-state">No products available yet.</div>
    </div>
  </section>

  <footer>
    <div class="container footer-box">
      <div>
        ©️ 2017–<span id="year"></span> Click Company. All rights reserved.
      </div>
      <div>You Can Depend on Us</div>
    </div>
  </footer>

  <button class="floating-cart" onclick="openCart()">🛒 <span id="count">0</span></button>

  <button id="whatsappBtn" class="floating-whatsapp" onclick="openWhatsAppDirect()">
    WhatsApp
  </button>

  <div class="cart-panel-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty-text">Your cart is empty.</div>
    </div>

    <div class="cart-footer">
      <button class="send-order-btn" onclick="sendOrderWhatsApp()">Send Order via WhatsApp</button>
    </div>
  </aside>

  <script>
    window.addEventListener("DOMContentLoaded", function() {
      document.getElementById("year").textContent = new Date().getFullYear();
    });
  </script>

  <script src="/js/cart.js"></script>

  <script>
    let renderedBrands = new Set();
    let currentCategoryFilter = "all";

    function normalizeBrand(filePath) {
      const cleanPath = String(filePath || "").replace(/\\/g, "/");
      const parts = cleanPath.split("/").filter(Boolean);

      if (!parts.length) return "Other";

      return parts[0]
        .replace(/-/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function populateBrandFilter() {
      const select = document.getElementById("brandFilter");
      if (!select) return;

      const currentValue = select.value || "all";
      const brands = Array.from(renderedBrands).sort((a, b) => a.localeCompare(b));

      select.innerHTML = `<option value="all">All Brands</option>`;

      brands.forEach(brand => {
        const option = document.createElement("option");
        option.value = brand;
        option.textContent = brand;
        select.appendChild(option);
      });

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      } else {
        select.value = "all";
      }
    }

    function filterProducts(category, buttonEl) {
      currentCategoryFilter = category;

      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
      if (buttonEl) buttonEl.classList.add("active");

      applyAllFilters();
    }

    function applyBrandFilter() {
      applyAllFilters();
    }

    function applyAllFilters() {
      const selectedBrand = document.getElementById("brandFilter")?.value || "all";
      const cards = document.querySelectorAll(".product-card");

      renderedBrands = new Set();

      cards.forEach(card => {
        const cardCategory = card.getAttribute("data-category") || "";
        const cardBrand = card.getAttribute("data-brand") || "";

        const matchCategory = currentCategoryFilter === "all" || cardCategory === currentCategoryFilter;

        if (matchCategory) {
          renderedBrands.add(cardBrand);
        }
      });

      populateBrandFilter();

      const updatedSelectedBrand = document.getElementById("brandFilter")?.value || "all";
      let visibleCount = 0;

      cards.forEach(card => {
        const cardCategory = card.getAttribute("data-category") || "";
        const cardBrand = card.getAttribute("data-brand") || "";

        const matchCategory = currentCategoryFilter === "all" || cardCategory === currentCategoryFilter;
        const matchBrand = updatedSelectedBrand === "all" || cardBrand === updatedSelectedBrand;
        const shouldShow = matchCategory && matchBrand;

        card.style.display = shouldShow ? "block" : "none";

        if (shouldShow) visibleCount++;
      });

      let empty = document.getElementById("empty-state");

      if (visibleCount === 0) {
        if (!empty) {
          empty = document.createElement("div");
          empty.className = "empty-state";
          empty.id = "empty-state";
          empty.textContent = "No products available for this filter.";
          document.getElementById("grid").appendChild(empty);
        } else {
          empty.textContent = "No products available for this filter.";
        }
      } else if (empty) {
        empty.remove();
      }
    }

    async function loadCategory(categoryName) {
      try {
        const res = await fetch(`/products/${categoryName}/index.json`);
        const files = await res.json();

        const items = [];

        for (const file of files) {
          try {
            const r = await fetch(`/products/${categoryName}/${file}`);
            const d = await r.json();

            if (!d.available) continue;

            items.push({
              ...d,
              category: categoryName,
              file
            });
          } catch (e) {
            console.error("Failed to load product file:", file, e);
          }
        }

        return items;
      } catch (e) {
        console.error(`Failed to load ${categoryName} index:`, e);
        return [];
      }
    }

    async function load() {
      const grid = document.getElementById("grid");
      let rendered = 0;

      const categories = ["phones", "tablets", "laptops", "accessories"];

      for (const category of categories) {
        const items = await loadCategory(category);

        for (const d of items) {
          const imagePath = (d.image || "/images/logo.png").trim();
          const brandName = normalizeBrand(d.file);

          const card = document.createElement("div");
          card.className = "product-card";
          card.setAttribute("data-category", category);
          card.setAttribute("data-brand", brandName);

          card.innerHTML = `
            <div class="product-image">
              <img src="${imagePath}" alt="${d.title || "Product"}">
            </div>

            <div class="product-body">
              <div class="row">
                <div>
                  <div class="price">${d.monthly || ""}</div>
                  <div class="months">${d.duration || ""}</div>
                  <div class="months">${d.down_payment || ""} Down Payment</div>
                </div>
                <button class="btn">+ Add To Cart</button>
              </div>
            </div>
          `;

          card.querySelector(".btn").onclick = () => {
            addToCart({
              title: d.title || `${category}-${d.file || "product"}`,
              price: d.monthly ? `${d.monthly} Monthly` : "",
              months: `${d.duration || ""}${d.down_payment ? ` • ${d.down_payment} Down Payment` : ""}`,
              image: imagePath
            });
          };

          grid.appendChild(card);
          rendered++;
        }
      }

      if (rendered) {
        const empty = document.getElementById("empty-state");
        if (empty) empty.remove();
      }

      applyAllFilters();
    }

    load();
  </script>

  <script>
    const texts = [
      "You Can Depend on Us",
      "Best Deals in Kuwait",
      "Easy Monthly Installments",
      "Fast Delivery"
    ];

    let i = 0;
    const el = document.getElementById("loopText");

    setInterval(() => {
      if (!el) return;

      el.style.opacity = 0;

      setTimeout(() => {
        i = (i + 1) % texts.length;
        el.textContent = texts[i];
        el.style.opacity = 1;
      }, 400);
    }, 3000);
  </script>

</body>
</html>
