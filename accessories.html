<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessories - Click Company</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .catalog-filter-wrap {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .catalog-filter-label {
      font-size: 14px;
      color: #c9d4e7;
      font-weight: bold;
    }

    .catalog-filter {
      width: 100%;
      max-width: 260px;
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #ffffff;
      color: #111827;
      padding: 0 14px;
      font-size: 14px;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .catalog-filter {
        max-width: 100%;
      }
    }
  </style>
</head>
<body class="page-catalog">

  <header>
    <div class="container nav">

      <div class="brand">
        <div class="brand-static">
          <img src="/images/logo.png" alt="Click Company Logo" class="logo">
          <div class="brand-text">
            <h1>CLICK COMPANY</h1>
            <span id="loopText">You Can Depend on Us</span>
          </div>
        </div>
      </div>

      <nav class="nav-links">
        <div class="nav-row main-row">
          <a href="index.html">Home</a>
          <a href="phones.html">Phones</a>
          <a href="tablets.html">Tablets</a>
          <a href="laptops.html">Laptops</a>
          <a href="accessories.html" class="active">Accessories</a>

          <button class="cart-btn" onclick="openCart()">
            Cart <span class="cart-badge" id="cart-count-top">0</span>
          </button>
        </div>

        <div class="nav-row hot-row">
          <a href="index.html#hot-offers" class="hot-link">Hot Offers</a>
        </div>
      </nav>

    </div>
  </header>

  <section class="page-head">
    <div class="container">
      <h2>Accessories</h2>
      <p>Browse all accessories offers.</p>

      <div class="catalog-filter-wrap">
        <label for="brandFilter" class="catalog-filter-label">Filter by Brand</label>
        <select id="brandFilter" class="catalog-filter" onchange="applyBrandFilter()">
          <option value="all">All Brands</option>
        </select>
      </div>
    </div>
  </section>

  <section class="container">
    <div class="products-grid" id="grid">
      <div class="empty-state" id="empty-state">No products available yet.</div>
    </div>
  </section>

  <footer>
    <div class="container footer-box">
      <div>
        ©️ 2017–<span id="year"></span> Click Company. All rights reserved.
      </div>
      <div>You Can Depend on Us</div>
    </div>
  </footer>

  <button class="floating-cart" onclick="openCart()">🛒 <span id="count">0</span></button>

  <button id="whatsappBtn" class="floating-whatsapp" onclick="openWhatsAppDirect()">
    WhatsApp
  </button>

  <div class="cart-panel-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty-text">Your cart is empty.</div>
    </div>

    <div class="cart-footer">
      <button class="send-order-btn" onclick="sendOrderWhatsApp()">Send Order via WhatsApp</button>
    </div>
  </aside>

  <script>
    window.addEventListener("DOMContentLoaded", function() {
      document.getElementById("year").textContent = new Date().getFullYear();
    });
  </script>

  <script src="/js/cart.js"></script>

  <script>
  const renderedBrands = new Set();

  function normalizeBrand(filePath) {
    const cleanPath = String(filePath || "").replace(/\\/g, "/");
    const parts = cleanPath.split("/").filter(Boolean);

    if (!parts.length) return "Other";

    const folderName = parts[0];

    return folderName
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function populateBrandFilter() {
    const select = document.getElementById("brandFilter");
    if (!select) return;

    const brands = Array.from(renderedBrands).sort((a, b) => a.localeCompare(b));

    select.innerHTML = `<option value="all">All Brands</option>`;

    brands.forEach(brand => {
      const option = document.createElement("option");
      option.value = brand;
      option.textContent = brand;
      select.appendChild(option);
    });
  }

  function applyBrandFilter() {
    const selectedBrand = document.getElementById("brandFilter")?.value || "all";
    const cards = document.querySelectorAll(".product-card[data-brand]");
    let visibleCount = 0;

    cards.forEach(card => {
      const cardBrand = card.getAttribute("data-brand") || "";
      const shouldShow = selectedBrand === "all" || cardBrand === selectedBrand;

      card.style.display = shouldShow ? "" : "none";

      if (shouldShow) visibleCount++;
    });

    let empty = document.getElementById("empty-state");

    if (visibleCount === 0) {
      if (!empty) {
        empty = document.createElement("div");
        empty.className = "empty-state";
        empty.id = "empty-state";
        empty.textContent = "No products available for this brand.";
        document.getElementById("grid").appendChild(empty);
      } else {
        empty.textContent = "No products available for this brand.";
      }
    } else if (empty) {
      empty.remove();
    }
  }

  async function load() {
    const grid = document.getElementById("grid");
    let rendered = 0;

    try {
      const res = await fetch("/products/accessories/index.json");
      const files = await res.json();

      const productResults = await Promise.all(
        files.map(async (file) => {
          try {
            const r = await fetch(`/products/accessories/${file}`);
            const d = await r.json();

            if (!d.available) return null;

            return {
              ...d,
              _file: file,
              _brandPriority: Number.isFinite(Number(d.brand_priority)) ? Number(d.brand_priority) : 9999,
              _priority: Number.isFinite(Number(d.priority)) ? Number(d.priority) : 9999
            };
          } catch (e) {
            console.error("Failed to load product file:", file, e);
            return null;
          }
        })
      );

      const products = productResults
        .filter(Boolean)
        .sort((a, b) => {
          if (a._brandPriority !== b._brandPriority) {
            return a._brandPriority - b._brandPriority;
          }

          if (a._priority !== b._priority) {
            return a._priority - b._priority;
          }

          return String(a.title || "").localeCompare(String(b.title || ""));
        });

      for (const d of products) {
        const imagePath = (d.image || "/images/logo.png").trim();
        const brandName = normalizeBrand(d._file);

        const card = document.createElement("div");
        card.className = "product-card";
        card.setAttribute("data-brand", brandName);

        card.innerHTML = `
          <div class="product-image">
            <img src="${imagePath}" alt="${d.title || "Product"}">
          </div>

          <div class="product-body">
            <div class="row">
              <div>
                <div class="price">${d.monthly || ""}</div>
                <div class="months">${d.duration || ""}</div>
                <div class="months">${d.down_payment || ""} Down Payment</div>
              </div>
              <button class="btn">+ Add To Cart</button>
            </div>
          </div>
        `;

        card.querySelector(".btn").onclick = () => {
          addToCart({
            title: d.title || d._file,
            price: d.monthly ? `${d.monthly} Monthly` : "",
            months: `${d.duration || ""}${d.down_payment ? ` • ${d.down_payment} Down Payment` : ""}`,
            image: imagePath
          });
        };

        grid.appendChild(card);
        renderedBrands.add(brandName);
        rendered++;
      }

      if (rendered) {
        const empty = document.getElementById("empty-state");
        if (empty) empty.remove();
      }

      populateBrandFilter();
      applyBrandFilter();

    } catch (e) {
      console.error("Failed to load accessories index:", e);
    }
  }

  load();
</script>

  <script>
    const texts = [
      "You Can Depend on Us",
      "Best Deals in Kuwait",
      "Easy Monthly Installments",
      "Fast Delivery"
    ];

    let i = 0;
    const el = document.getElementById("loopText");

    setInterval(() => {
      if (!el) return;

      el.style.opacity = 0;

      setTimeout(() => {
        i = (i + 1) % texts.length;
        el.textContent = texts[i];
        el.style.opacity = 1;
      }, 400);
    }, 3000);
  </script>

</body>
</html>
