<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessories - Click Company</title>

  <link rel="stylesheet" href="/css/style.css?v=20260404" />

  <style>
    .promo-banner {
      display: none;
      width: 100%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 10px 24px rgba(22,163,74,0.18);
    }

    .promo-banner.show {
      display: block;
    }

    .promo-banner .promo-banner-inner {
      width: min(1180px, 92%);
      margin: auto;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.6;
    }

    .promo-banner .promo-banner-icon {
      font-size: 18px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .catalog-filter-wrap {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .catalog-filter-label {
      font-size: 14px;
      color: #c9d4e7;
      font-weight: bold;
    }

    .catalog-filter {
      width: 100%;
      max-width: 260px;
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #ffffff;
      color: #111827;
      padding: 0 14px;
      font-size: 14px;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    .loading-state {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 24px;
      color: #c9d4e7;
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    .product-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 10px;
      color: #111827;
      min-height: 46px;
    }

    .desktop-only {
      display: inline-flex;
    }

    .mobile-only {
      display: none;
    }

    .registration-top-btn {
      color: #fff;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: 0.2s ease;
      flex: 0 0 auto;
      font-weight: 700;
    }

    .registration-top-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    @media (max-width: 640px) {
      .promo-banner .promo-banner-inner {
        font-size: 13px;
        padding: 10px 0;
      }

      .catalog-filter {
        max-width: 100%;
      }

      .desktop-only {
        display: none !important;
      }

      .mobile-only {
        display: inline-flex !important;
      }
    }
  </style>
</head>
<body class="page-catalog">

  <header>
    <div class="container nav">
      <div class="brand">
        <div class="brand-static">
          <img src="/images/logo.png" alt="Click Company Logo" class="logo">
          <div class="brand-text">
            <h1>CLICK COMPANY</h1>
            <span id="loopText">You Can Depend on Us</span>
          </div>
        </div>
      </div>

      <nav class="nav-links">
        <div class="nav-row main-row">
          <a href="/index.html" class="desktop-only">Home</a>
          <a href="/phones.html">Phones</a>
          <a href="/tablets.html">Tablets</a>
          <a href="/laptops.html">Laptops</a>
          <a href="/accessories.html" class="active">Accessories</a>
          <a href="/index.html#hot-offers" class="hot-link">Hot Offers</a>

          <button class="registration-top-btn desktop-only" type="button" onclick="openAuthModal()">
            <span id="desktopAuthLabel">Login</span>
          </button>

          <button class="cart-btn" onclick="openCart()">
            Cart <span class="cart-badge" id="cart-count-top">0</span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <div class="promo-banner" id="promoBanner">
    <div class="promo-banner-inner">
      <span class="promo-banner-icon">🎁</span>
      <span id="promoBannerText"></span>
    </div>
  </div>

  <section class="page-head">
    <div class="container">
      <h2>Accessories</h2>
      <p>Browse all accessories offers.</p>

      <div class="catalog-filter-wrap">
        <label for="brandFilter" class="catalog-filter-label">Filter by Brand</label>
        <select id="brandFilter" class="catalog-filter" onchange="applyBrandFilter()">
          <option value="all">All Brands</option>
        </select>
      </div>
    </div>
  </section>

  <section class="container">
    <div class="products-grid" id="grid">
      <div class="loading-state" id="loading-state">Loading products...</div>
      <div class="empty-state" id="empty-state" style="display:none;">No products available yet.</div>
    </div>
  </section>

  <footer>
    <div class="container footer-box">
      <div>©️ 2017–<span id="year"></span> Click Company. All rights reserved.</div>
      <div>You Can Depend on Us</div>
    </div>
  </footer>

  <button class="floating-cart" onclick="openCart()">
    <span id="count">0</span>
  </button>

  <button id="whatsappBtn" class="floating-whatsapp" onclick="openWhatsAppDirect()">WhatsApp</button>

  <div class="cart-panel-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty-text">Your cart is empty.</div>
    </div>

    <div class="cart-footer">
      <button class="send-order-btn" type="button">Send Order via WhatsApp</button>
    </div>
  </aside>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      const year = document.getElementById("year");
      if (year) {
        year.textContent = new Date().getFullYear();
      }
    });
  </script>
  
  <script>
    let productsData = [];
    let renderedBrands = new Set();

    function normalizeBrandValue(value) {
      const raw = String(value || "").trim();
      if (!raw) return "Other";

      return raw
        .replace(/\s*\/\s*/g, " / ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function formatComboTitle(title) {
      const raw = String(title || "").trim();
      if (!raw) return "";
      return raw.replace(/\s*\/\s*/g, " + ").replace(/\s*\+\s*/g, " + ");
    }

    function extractNumber(value) {
      const raw = String(value || "").trim();
      const match = raw.match(/\d+(\.\d+)?/);
      return match ? match[0] : "";
    }

    function formatMonthly(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/kd/i.test(raw)) return raw;
      const number = extractNumber(raw);
      return number ? `${number} KD` : raw;
    }

    function formatDuration(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/month/i.test(raw)) return raw;
      const number = extractNumber(raw);
      return number ? `${number} Months` : raw;
    }

    function formatDownPayment(value) {
      const raw = String(value || "").trim();
      if (!raw) return "0 KD Down Payment";
      if (/down payment/i.test(raw)) return raw;
      if (/kd/i.test(raw)) return `${raw} Down Payment`;
      const number = extractNumber(raw);
      return number ? `${number} KD Down Payment` : "0 KD Down Payment";
    }

    function normalizeDevicesCount(value, title) {
      const raw = String(value || "").trim();
      if (raw) return raw;

      const cleanTitle = String(title || "").trim();
      if (!cleanTitle) return "1";

      const parts = cleanTitle.split(/\s*\+\s*|\s*\/\s*/).filter(Boolean);
      return String(parts.length || 1);
    }

    function calculateTotalPrice(product, monthlyText, durationText, downPaymentText) {
      if (product.total_price) {
        return formatMonthly(product.total_price);
      }

      const monthly = parseFloat(extractNumber(monthlyText)) || 0;
      const months = parseFloat(extractNumber(durationText)) || 0;
      const down = parseFloat(extractNumber(downPaymentText)) || 0;
      const total = (monthly * months) + down;

      return total ? `${total} KD` : "";
    }

    function populateBrandFilter() {
      const select = document.getElementById("brandFilter");
      if (!select) return;

      const currentValue = select.value || "all";
      const brands = Array.from(renderedBrands).filter(Boolean).sort((a, b) => a.localeCompare(b));

      select.innerHTML = '<option value="all">All Brands</option>';

      brands.forEach(brand => {
        const option = document.createElement("option");
        option.value = brand;
        option.textContent = brand;
        select.appendChild(option);
      });

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      } else {
        select.value = "all";
      }
    }

    function buildProductCard(product) {
      const imagePath = String(product.image || "/images/logo.png").trim();
      const brandName = normalizeBrandValue(product.brand);

      const monthlyText = formatMonthly(product.monthly);
      const durationText = formatDuration(product.duration);
      const downPaymentText = formatDownPayment(product.down_payment);
      const titleText = formatComboTitle(product.title || "");
      const totalPriceText = calculateTotalPrice(product, monthlyText, durationText, downPaymentText);
      const devicesCountText = normalizeDevicesCount(product.devices_count, titleText);

      const card = document.createElement("div");
      card.className = "product-card";
      card.setAttribute("data-brand", brandName);

      card.innerHTML = `
        <div class="product-image">
          <img src="${imagePath}" alt="${titleText || "Product"}" loading="lazy">
        </div>

        <div class="product-body">
          <div class="product-title">${titleText}</div>

          <div class="row">
            <div>
              <div class="price">${monthlyText}</div>
              <div class="months">${durationText}</div>
              <div class="months">${downPaymentText}</div>
            </div>
            <button class="btn">+ Add To Cart</button>
          </div>
        </div>
      `;

      const addBtn = card.querySelector(".btn");
      if (addBtn) {
        addBtn.onclick = () => {
          addToCart({
            title: titleText || "Product",
            image: imagePath,
            price: monthlyText,
            months: `${durationText} • ${downPaymentText}`,
            monthly: monthlyText,
            duration: durationText,
            down_payment: downPaymentText,
            total_price: totalPriceText,
            devices_count: devicesCountText
          });
        };
      }

      return { card, brandName };
    }

    function applyBrandFilter() {
      const selectedBrand = document.getElementById("brandFilter")?.value || "all";
      const cards = document.querySelectorAll(".product-card[data-brand]");
      const empty = document.getElementById("empty-state");
      let visibleCount = 0;

      cards.forEach(card => {
        const cardBrand = card.getAttribute("data-brand") || "";
        const shouldShow = selectedBrand === "all" || cardBrand === selectedBrand;

        card.style.display = shouldShow ? "" : "none";
        if (shouldShow) visibleCount++;
      });

      if (empty) {
        if (visibleCount === 0) {
          empty.style.display = "";
          empty.textContent = "No products available for this brand.";
        } else {
          empty.style.display = "none";
        }
      }
    }

    function renderProducts(items) {
      const grid = document.getElementById("grid");
      const loading = document.getElementById("loading-state");
      const empty = document.getElementById("empty-state");

      document.querySelectorAll(".product-card").forEach(card => card.remove());
      renderedBrands = new Set();

      const visibleProducts = items
        .filter(item => item && item.available === true)
        .sort((a, b) => {
          const aOrder = Number.isFinite(Number(a.product_order)) ? Number(a.product_order) : 9999;
          const bOrder = Number.isFinite(Number(b.product_order)) ? Number(b.product_order) : 9999;
          if (aOrder !== bOrder) return aOrder - bOrder;

          return String(a.title || "").localeCompare(String(b.title || ""));
        });

      if (loading) loading.remove();

      if (!visibleProducts.length) {
        if (empty) {
          empty.style.display = "";
          empty.textContent = "No products available yet.";
        }
        populateBrandFilter();
        return;
      }

      const fragment = document.createDocumentFragment();

      visibleProducts.forEach(product => {
        const { card, brandName } = buildProductCard(product);
        fragment.appendChild(card);
        renderedBrands.add(brandName);
      });

      grid.appendChild(fragment);

      if (empty) empty.style.display = "none";

      populateBrandFilter();
      applyBrandFilter();
    }

    async function load() {
      try {
        const res = await fetch("/products/accessories/data.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load accessories data.json");

        const items = await res.json();
        if (!Array.isArray(items)) throw new Error("accessories data.json must be an array");

        productsData = items
          .filter(item => item && typeof item === "object")
          .map(item => ({
            ...item,
            category: "accessories"
          }));

        renderProducts(productsData);
      } catch (e) {
        console.error("Failed to load accessories data:", e);

        const loading = document.getElementById("loading-state");
        const empty = document.getElementById("empty-state");

        if (loading) loading.remove();
        if (empty) {
          empty.style.display = "";
          empty.textContent = "Failed to load products.";
        }
      }
    }

    load();
  </script>

  <script>
    const texts = [
      "You Can Depend on Us",
      "Best Deals in Kuwait",
      "Easy Monthly Installments",
      "Fast Delivery"
    ];

    let i = 0;
    const el = document.getElementById("loopText");

    setInterval(() => {
      if (!el) return;
      el.style.opacity = 0;

      setTimeout(() => {
        i = (i + 1) % texts.length;
        el.textContent = texts[i];
        el.style.opacity = 1;
      }, 400);
    }, 3000);
  </script>

  <script>
    function orderAlreadyUsedGift(order) {
      if (!order || typeof order !== "object") return false;

      const hasGift = order.has_promotional_gift === true || order.has_promotional_gift === 1 || String(order.has_promotional_gift) === "1";
      const hasGiftLabel = !!String(order.gift_label || "").trim();

      return hasGift || hasGiftLabel;
    }

    function orderClearlyConsumedFirstOrderOffer(order) {
      if (!order || typeof order !== "object") return false;

      const status = String(order.status || "").toLowerCase();
      const isDeliveredLike = status.includes("completed") || status.includes("delivered");
      const isFirstOrder = order.is_first_order === true || order.is_first_order === 1 || String(order.is_first_order) === "1";

      return isDeliveredLike && isFirstOrder && orderAlreadyUsedGift(order);
    }

    async function updatePromoBanner() {
      const banner = document.getElementById("promoBanner");
      const text = document.getElementById("promoBannerText");

      if (!banner || !text) return;

      banner.classList.remove("show");
      banner.style.display = "";

      try {
        const statusRes = await fetch("/auth/status.php", { cache: "no-store" });
        const statusData = await statusRes.json();

        if (!statusData || !statusData.logged_in) {
          text.textContent = "Register now and get a FREE gift with your first delivered order.";
          banner.classList.add("show");
          return;
        }

        text.textContent = "You are registered. Your FREE gift will be included with your first delivered order.";
        banner.classList.add("show");

        try {
          const ordersRes = await fetch("/orders/list.php", { cache: "no-store" });
          const ordersData = await ordersRes.json();

          if (ordersData && ordersData.ok && Array.isArray(ordersData.orders)) {
            const consumedOffer = ordersData.orders.some(orderClearlyConsumedFirstOrderOffer);

            if (consumedOffer) {
              banner.classList.remove("show");
              banner.style.display = "none";
              return;
            }
          }
        } catch (orderError) {
          console.error("Promo orders check failed:", orderError);
        }
      } catch (e) {
        console.error("Promo status check failed:", e);
        text.textContent = "Register now and get a FREE gift with your first delivered order.";
        banner.classList.add("show");
      }
    }

    document.addEventListener("DOMContentLoaded", updatePromoBanner);
    document.addEventListener("customer-auth-updated", updatePromoBanner);
  </script>

  <script src="/js/cart.js?v=20260404"></script>
  <script src="/js/country-codes.js?v=20260404"></script>
  <script src="/js/customer-auth.js?v=20260404"></script>
</body>
