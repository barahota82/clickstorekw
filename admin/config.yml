backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "en"

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "products"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}} — {{price}}"
    identifier_field: "title"

    fields:
      - label: "Product Name"
        name: "title"
        widget: "string"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Phones"
          - "Tablets"
          - "Laptops"
          - "Accessories"

      - label: "Monthly Price"
        name: "price"
        widget: "string"
        hint: "Example: 10 KD / month"

      - label: "Months to Pay"
        name: "months"
        widget: "string"
        hint: "Example: 12 months to pay"

      - label: "WhatsApp Link"
        name: "whatsapp"
        widget: "string"
        hint: "Example: https://wa.me/96567680877?text=Hello%20I%20want%20Samsung%20A16"

      - label: "Product Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Features"
        name: "features"
        widget: "list"
        required: false
        hint: "Add short product features"
        field:
          label: "Feature"
          name: "feature"
          widget: "string"

      - label: "Available"
        name: "available"
        widget: "boolean"
        default: true

      - label: "Featured Product"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 100
        required: false
        value_type: "int"

      - label: "Short Note"
        name: "note"
        widget: "string"
        required: false
        hint: "Example: Fast approval / Limited offer / Best seller"
