backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "images/products"
public_folder: "/images/products"

site_url: "/"
display_url: "/"
logo_url: "/images/logo.png"

collections:
  - name: "phones"
    label: "Phones"
    folder: "products/phones"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "hidden", default: "Phones" }
      - { label: "Price", name: "price", widget: "string", hint: "Example: 320 KD" }
      - { label: "Months", name: "months", widget: "string", hint: "Example: 12 months" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/phones", public_folder: "/images/products/phones" }
      - { label: "Available", name: "available", widget: "boolean", default: true }
      - { label: "Hot Offer", name: "hot_offer", widget: "boolean", default: false }

  - name: "tablets"
    label: "Tablets"
    folder: "products/tablets"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "hidden", default: "Tablets" }
      - { label: "Price", name: "price", widget: "string", hint: "Example: 180 KD" }
      - { label: "Months", name: "months", widget: "string", hint: "Example: 12 months" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/tablets", public_folder: "/images/products/tablets" }
      - { label: "Available", name: "available", widget: "boolean", default: true }
      - { label: "Hot Offer", name: "hot_offer", widget: "boolean", default: false }

  - name: "laptops"
    label: "Laptops"
    folder: "products/laptops"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "hidden", default: "Laptops" }
      - { label: "Price", name: "price", widget: "string", hint: "Example: 250 KD" }
      - { label: "Months", name: "months", widget: "string", hint: "Example: 18 months" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/laptops", public_folder: "/images/products/laptops" }
      - { label: "Available", name: "available", widget: "boolean", default: true }
      - { label: "Hot Offer", name: "hot_offer", widget: "boolean", default: false }

  - name: "accessories"
    label: "Accessories"
    folder: "products/accessories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "hidden", default: "Accessories" }
      - { label: "Price", name: "price", widget: "string", hint: "Example: 25 KD" }
      - { label: "Months", name: "months", widget: "string", hint: "Example: 3 months" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", media_folder: "/images/products/accessories", public_folder: "/images/products/accessories" }
      - { label: "Available", name: "available", widget: "boolean", default: true }
      - { label: "Hot Offer", name: "hot_offer", widget: "boolean", default: false }
