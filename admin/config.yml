backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "اسم المنتج", name: "title", widget: "string" }
      - { label: "التصنيف", name: "category", widget: "select", options: ["Phones", "Tablets", "Laptops", "Accessories"] }
      - { label: "السعر الشهري", name: "price", widget: "string" }
      - { label: "عدد الأشهر", name: "months", widget: "string" }
      - { label: "رابط واتساب", name: "whatsapp", widget: "string" }
      - { label: "صورة المنتج", name: "image", widget: "image" }
      - { label: "متوفر؟", name: "available", widget: "boolean", default: true }
