backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{category}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Phones", "Tablets", "Laptops", "Accessories"] }
      - { label: "Monthly Price", name: "price", widget: "string" }
      - { label: "Months to Pay", name: "months", widget: "string" }
      - { label: "WhatsApp Link", name: "whatsapp", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Available", name: "available", widget: "boolean", default: true }
