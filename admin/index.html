  <script>
    function slugify(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/_/g, "-")
        .replace(/-+/g, "-")
        .replace(/\s*\+\s*/g, "+")
        .replace(/[^a-z0-9\-+]/g, "")
        .replace(/-+/g, "-")
        .replace(/^\-+|\-+$/g, "");
    }

    function titleCaseWord(word) {
      if (!word) return "";
      if (/^\d+[a-z]+$/i.test(word)) return word.toUpperCase();
      return word.charAt(0).toUpperCase() + word.slice(1);
    }

    function titleFromDeviceSlug(slug) {
      return slug
        .split("-")
        .filter(Boolean)
        .map(titleCaseWord)
        .join(" ");
    }

    function getImageExt(fileName) {
      const match = String(fileName || "").match(/\.([a-zA-Z0-9]+)$/);
      return match ? match[0].toLowerCase() : ".webp";
    }

    function b64EncodeUnicode(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function b64DecodeUnicode(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    function setStatus(type, message) {
      const box = document.getElementById("statusBox");
      box.className = `status ${type}`;
      box.style.display = "block";
      box.textContent = message;
    }

    function clearStatus() {
      const box = document.getElementById("statusBox");
      box.className = "status info";
      box.style.display = "none";
      box.textContent = "";
    }

    function previewImageFile(file) {
      const img = document.getElementById("previewImage");
      if (!file) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        img.src = e.target.result;
        img.style.display = "block";
      };
      reader.readAsDataURL(file);
    }
function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function preprocessImageForOCR(file) {
  const img = await loadImageFromFile(file);

  const scale = 2.5;
  const canvas = document.createElement("canvas");
  canvas.width = Math.floor(img.width * scale);
  canvas.height = Math.floor(img.height * scale);

  const ctx = canvas.getContext("2d");
  const sourceX = img.width * 0.55;     // آخر ربع عرض
const sourceY = img.height * 0.55;    // آخر ربع ارتفاع
const sourceWidth = img.width * 0.45; 
const sourceHeight = img.height * 0.45;

ctx.drawImage(
  img,
  sourceX, sourceY, sourceWidth, sourceHeight,
  0, 0, canvas.width, canvas.height
);
  
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    let gray = 0.299 * r + 0.587 * g + 0.114 * b;
    gray = gray > 145 ? 255 : gray < 110 ? 0 : gray;

    data[i] = gray;
    data[i + 1] = gray;
    data[i + 2] = gray;
  }

  ctx.putImageData(imageData, 0, 0);
  return canvas;
}
    function splitOfferPartsFromFilename(fileName) {
      const raw = String(fileName || "").replace(/\.[^/.]+$/, "");
      return raw
        .split("+")
        .map(part => slugify(part))
        .map(part => part.replace(/-+/g, "-").replace(/^-|-$/g, ""))
        .filter(Boolean);
    }

    function extractBrandFromDeviceSlug(deviceSlug) {
  const words = deviceSlug.split("-").filter(Boolean);
  if (!words.length) return "";

  const first = words[0];
  const second = words[1] || "";

  // لو الكلمة الثانية فيها أرقام => هذه موديل وليست جزء من البراند
  if (/\d/.test(second)) {
    return first;
  }

  // ندعم البراندات المركبة مثل:
  // m-horse / s-color
  // بشرط أن أول جزء حرف واحد فقط والثاني حروف فقط
  if (
    first.length === 1 &&
    second &&
    /^[a-z]+$/i.test(second)
  ) {
    return `${first}-${second}`;
  }

  // في كل الحالات الأخرى البراند هو أول كلمة فقط
  return first;
}

    function detectFilenameData(fileName) {
      const parts = splitOfferPartsFromFilename(fileName);
      const devicesCount = parts.length || 1;

      const titles = parts.map(part => titleFromDeviceSlug(part));
      const brands = parts.map(part => titleFromDeviceSlug(extractBrandFromDeviceSlug(part)));

      return {
        devicesCount,
        title: titles.join(" + "),
        brand: devicesCount === 1 ? (brands[0] || "") : brands.join(" / "),
        storageBrandSlug: parts.length ? extractBrandFromDeviceSlug(parts[0]) : "",
        storageBrand: parts.length ? titleFromDeviceSlug(extractBrandFromDeviceSlug(parts[0])) : ""
      };
    }

function extractFinancialsFromText(text) {
  const clean = String(text || "")
    .replace(/\r/g, "")
    .replace(/O/g, "0")
    .replace(/o/g, "0")
    .replace(/I/g, "1")
    .replace(/l/g, "1")
    .replace(/S(?=\s*MONTH)/gi, "5")
    .trim();

  const lines = clean
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  let downPayment = "";
  let monthly = "";
  let duration = "";

  function firstNumber(str) {
    const match = String(str || "").match(/\d+/);
    return match ? match[0] : "";
  }

  function hasMonthly(str) {
    const s = String(str || "").toLowerCase();
    return (
      s.includes("monthly") ||
      s.includes("month1y") ||
      s.includes("monthiy") ||
      s.includes("m0nthly")
    );
  }

  function hasDownPayment(str) {
    const s = String(str || "").toLowerCase();
    return (
      s.includes("down") ||
      s.includes("payment") ||
      s.includes("paynent") ||
      s.includes("payrnent")
    );
  }

  function hasZero(str) {
    const s = String(str || "").toLowerCase();
    return s.includes("zero") || s.includes("zer0");
  }

  function hasDuration(str) {
    const s = String(str || "").toLowerCase();
    return (
      s.includes("months") ||
      s.includes("month") ||
      s.includes("m0nths") ||
      s.includes("to pay") ||
      s.includes("topay") ||
      s.includes("pay")
    );
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (hasMonthly(line)) {
      monthly = firstNumber(line);

      if (i > 0) {
        const prevLine = lines[i - 1];

        if (hasZero(prevLine)) {
          downPayment = "0";
        } else {
          const prevNumber = firstNumber(prevLine);
          downPayment = prevNumber || "0";
        }
      } else {
        downPayment = "0";
      }

      if (i < lines.length - 1) {
        const nextLine = lines[i + 1];
        const nextNumber = firstNumber(nextLine);
        if (nextNumber) {
          duration = nextNumber;
        }
      }

      break;
    }
  }

  if (!monthly) {
    for (let i = 0; i < lines.length; i++) {
      if (hasMonthly(lines[i])) {
        monthly = firstNumber(lines[i]);
        break;
      }
    }
  }

  if (!duration) {
    for (let i = 0; i < lines.length; i++) {
      if (hasDuration(lines[i])) {
        const n = firstNumber(lines[i]);
        if (n && n !== monthly) {
          duration = n;
          break;
        }
      }
    }
  }

  if (!downPayment) {
    for (let i = 0; i < lines.length; i++) {
      if (hasDownPayment(lines[i])) {
        if (hasZero(lines[i])) {
          downPayment = "0";
        } else {
          const n = firstNumber(lines[i]);
          downPayment = n || "0";
        }
        break;
      }
    }
  }

  return {
    downPayment,
    monthly,
    duration,
    rawText: clean
  };
}
    
    async function runOCRFromImage(file) {
  const processedCanvas = await preprocessImageForOCR(file);

  const croppedResult = await Tesseract.recognize(processedCanvas, "eng", {
    logger: m => {
      if (m.status === "recognizing text") {
        const pct = Math.round((m.progress || 0) * 100);
        setStatus("info", `Reading cropped area... ${pct}%`);
      }
    }
  });

  const fullResult = await Tesseract.recognize(file, "eng", {
    logger: m => {
      if (m.status === "recognizing text") {
        const pct = Math.round((m.progress || 0) * 100);
        setStatus("info", `Reading full image... ${pct}%`);
      }
    }
  });

  const croppedData = extractFinancialsFromText(croppedResult.data.text || "");
  const fullData = extractFinancialsFromText(fullResult.data.text || "");

  return {
    downPayment: croppedData.downPayment || fullData.downPayment || "",
    monthly: croppedData.monthly || fullData.monthly || "",
    duration: croppedData.duration || fullData.duration || "",
    rawText:
      `--- CROPPED OCR ---\n${croppedData.rawText || ""}\n\n--- FULL OCR ---\n${fullData.rawText || ""}`
  };
}

    async function smartAutoFill() {
  clearStatus();

  const fileInput = document.getElementById("productImage");
  const file = fileInput.files[0];

  if (!file) {
    setStatus("err", "Please choose an image first.");
    return;
  }

  previewImageFile(file);

  const fromName = detectFilenameData(file.name);

  if (!document.getElementById("title").value.trim()) {
    document.getElementById("title").value = fromName.title;
  }

  if (!document.getElementById("brand").value.trim()) {
    document.getElementById("brand").value = fromName.brand;
  }

  document.getElementById("devices_count").value = fromName.devicesCount || 1;

  try {
    const fromOCR = await runOCRFromImage(file);

    if (fromOCR.downPayment) {
      document.getElementById("down_payment").value = fromOCR.downPayment;
    }

    if (fromOCR.monthly) {
      document.getElementById("monthly").value = fromOCR.monthly;
    }

    if (fromOCR.duration) {
      document.getElementById("duration").value = fromOCR.duration;
    }

    setStatus(
      "ok",
      `Smart auto fill completed.

Title: ${document.getElementById("title").value}
Brand: ${document.getElementById("brand").value}
Devices Count: ${document.getElementById("devices_count").value}
Down Payment: ${document.getElementById("down_payment").value}
Monthly: ${document.getElementById("monthly").value}
Duration: ${document.getElementById("duration").value}

OCR Text:
${fromOCR.rawText || "No text found"}`
    );
  } catch (err) {
    setStatus("err", `OCR failed.\n${err.message}`);
  }

  generatePreview();
}
    function getFormData() {
      const category = document.getElementById("category").value;
      const brand = document.getElementById("brand").value.trim();
      const title = document.getElementById("title").value.trim();
      const devices_count = parseInt(document.getElementById("devices_count").value || "1", 10);

      const downPaymentNumber = document.getElementById("down_payment").value.trim() || "0";
      const monthlyNumber = document.getElementById("monthly").value.trim();
      const durationNumber = document.getElementById("duration").value.trim();

      const down_payment = `${downPaymentNumber} KD`;
      const monthly = monthlyNumber ? `${monthlyNumber} KD` : "";
      const duration = durationNumber ? `${durationNumber} Months` : "";

      const available = document.getElementById("available").checked;
      const hot_offer = document.getElementById("hot_offer").checked;
      const imageFile = document.getElementById("productImage").files[0] || null;

      const nameData = imageFile ? detectFilenameData(imageFile.name) : {
        storageBrandSlug: slugify(brand.split("/")[0].trim()),
        storageBrand: brand.split("/")[0].trim()
      };

      const brandSlug = slugify(nameData.storageBrandSlug || brand.split("/")[0].trim());

      // اسم الملف يكون من اسم الصورة، ومع العرض + يتحول إلى -
      const titleSlug = imageFile
        ? slugify(imageFile.name.replace(/\.[^.]+$/, "").replace(/\+/g, "-"))
        : slugify(title);

      return {
        category,
        brand,
        title,
        brandSlug,
        storageBrand: nameData.storageBrand || "",
        titleSlug,
        devices_count: Number.isFinite(devices_count) && devices_count > 0 ? devices_count : 1,
        down_payment,
        monthly,
        duration,
        available,
        hot_offer,
        imageFile
      };
    }

    function buildPaths(data) {
      const ext = data.imageFile ? getImageExt(data.imageFile.name) : ".webp";

      const imageNameSlug = data.imageFile
        ? slugify(data.imageFile.name.replace(/\.[^.]+$/, "").replace(/\+/g, "-"))
        : data.titleSlug;

      const imagePath = `/images/${data.category}/${data.brandSlug}/${imageNameSlug}${ext}`;
      const productPath = `/products/${data.category}/${data.brandSlug}/${data.titleSlug}.json`;
      const indexPath = `/products/${data.category}/index.json`;

      return { imagePath, productPath, indexPath, imageNameSlug, ext };
    }

    function buildProductJson(data, paths) {
      return {
        title: data.title,
        category: data.category,
        brand: data.brand,
        devices_count: data.devices_count,
        image: paths.imagePath,
        down_payment: data.down_payment,
        monthly: data.monthly,
        duration: data.duration,
        available: data.available,
        hot_offer: data.hot_offer
      };
    }

    function validateData(data) {
      if (!data.brand) return "Brand is required.";
      if (!data.title) return "Title is required.";
      if (!data.monthly) return "Monthly is required.";
      if (!data.duration) return "Duration is required.";
      if (!data.imageFile) return "Please choose an image file.";
      if (!data.brandSlug) return "Brand slug is empty.";
      if (!data.titleSlug) return "Title slug is empty.";
      return "";
    }

    function generatePreview() {
      clearStatus();

      const data = getFormData();
      const error = validateData(data);
      const paths = buildPaths(data);

      document.getElementById("storageBrandPreview").textContent = data.storageBrand || "-";
      document.getElementById("brandSlugPreview").textContent = data.brandSlug || "-";
      document.getElementById("titleSlugPreview").textContent = data.titleSlug || "-";
      document.getElementById("imagePathPreview").textContent = paths.imagePath;
      document.getElementById("productPathPreview").textContent = paths.productPath;
      document.getElementById("indexPathPreview").textContent = paths.indexPath;

      if (data.imageFile) {
        previewImageFile(data.imageFile);
      }

      if (error) {
        document.getElementById("jsonPreview").value = "";
        setStatus("err", error);
        return null;
      }

      const productJson = buildProductJson(data, paths);
      document.getElementById("jsonPreview").value = JSON.stringify(productJson, null, 2);
      return { data, paths, productJson };
    }

    async function githubGetFile(owner, repo, path, token, branch) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${encodeURIComponent(branch)}`;
      const res = await fetch(url, {
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json"
        }
      });

      if (res.status === 404) return null;
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`GET ${path} failed: ${text}`);
      }

      return await res.json();
    }

    async function githubPutFile(owner, repo, path, token, branch, contentBase64, message, sha = null) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const body = {
        message,
        content: contentBase64,
        branch
      };
      if (sha) body.sha = sha;

      const res = await fetch(url, {
        method: "PUT",
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(`PUT ${path} failed: ${text}`);
      }

      return await res.json();
    }

    async function fileToBase64(file) {
      const buffer = await file.arrayBuffer();
      let binary = "";
      const bytes = new Uint8Array(buffer);
      const chunkSize = 0x8000;

      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }

      return btoa(binary);
    }

    async function updateIndexJson(owner, repo, token, branch, category, brandSlug, productSlug) {
      const indexPath = `products/${category}/index.json`;
      const relativePath = `${brandSlug}/${productSlug}.json`;

      const existing = await githubGetFile(owner, repo, indexPath, token, branch);

      let list = [];
      let sha = null;

      if (existing) {
        sha = existing.sha;
        try {
          list = JSON.parse(b64DecodeUnicode(existing.content.replace(/\n/g, "")));
          if (!Array.isArray(list)) list = [];
        } catch {
          list = [];
        }
      }

      if (!list.includes(relativePath)) {
        list.push(relativePath);
      }

      list.sort((a, b) => a.localeCompare(b));

      const content = b64EncodeUnicode(JSON.stringify(list, null, 2) + "\n");

      await githubPutFile(
        owner,
        repo,
        indexPath,
        token,
        branch,
        content,
        `Update ${indexPath}`,
        sha
      );
    }

    async function saveAll() {
      const token = document.getElementById("githubToken").value.trim();
      const owner = document.getElementById("owner").value.trim();
      const repo = document.getElementById("repo").value.trim();
      const branch = document.getElementById("branch").value.trim();

      if (!token) {
        setStatus("err", "GitHub token is required.");
        return;
      }

      if (!owner || !repo || !branch) {
        setStatus("err", "Owner, repo, and branch are required.");
        return;
      }

      const preview = generatePreview();
      if (!preview) return;

      const { data, paths, productJson } = preview;

      try {
        setStatus("info", "Uploading image...");
        const imageContent = await fileToBase64(data.imageFile);
        const imageRepoPath = paths.imagePath.replace(/^\//, "");
        const existingImage = await githubGetFile(owner, repo, imageRepoPath, token, branch);

        await githubPutFile(
          owner,
          repo,
          imageRepoPath,
          token,
          branch,
          imageContent,
          `Upload ${imageRepoPath}`,
          existingImage ? existingImage.sha : null
        );

        setStatus("info", "Saving product JSON...");
        const productRepoPath = paths.productPath.replace(/^\//, "");
        const productContent = b64EncodeUnicode(JSON.stringify(productJson, null, 2) + "\n");
        const existingProduct = await githubGetFile(owner, repo, productRepoPath, token, branch);

        await githubPutFile(
          owner,
          repo,
          productRepoPath,
          token,
          branch,
          productContent,
          `Save ${productRepoPath}`,
          existingProduct ? existingProduct.sha : null
        );

        setStatus("info", "Updating index.json...");
        await updateIndexJson(owner, repo, token, branch, data.category, data.brandSlug, data.titleSlug);

        setStatus(
          "ok",
          `Done successfully.

Image: ${paths.imagePath}
Product: ${paths.productPath}
Index updated: ${paths.indexPath}`
        );
      } catch (err) {
        setStatus("err", err.message || "Unknown error");
      }
    }

    function resetForm() {
      document.getElementById("brand").value = "";
      document.getElementById("title").value = "";
      document.getElementById("devices_count").value = "1";
      document.getElementById("down_payment").value = "0";
      document.getElementById("monthly").value = "";
      document.getElementById("duration").value = "";
      document.getElementById("available").checked = true;
      document.getElementById("hot_offer").checked = false;
      document.getElementById("productImage").value = "";
      document.getElementById("jsonPreview").value = "";
      document.getElementById("storageBrandPreview").textContent = "-";
      document.getElementById("brandSlugPreview").textContent = "-";
      document.getElementById("titleSlugPreview").textContent = "-";
      document.getElementById("imagePathPreview").textContent = "-";
      document.getElementById("productPathPreview").textContent = "-";
      document.getElementById("indexPathPreview").textContent = "-";
      previewImageFile(null);
      clearStatus();
    }

    document.getElementById("productImage").addEventListener("change", () => {
      const file = document.getElementById("productImage").files[0];
      previewImageFile(file);
    });
  </script>
