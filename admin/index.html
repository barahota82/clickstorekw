<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Store KW Admin</title>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    body {
      margin: 0;
      background: #08111f;
      font-family: Arial, sans-serif;
      color: white;
    }

    .admin-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      text-align: center;
      padding: 20px;
    }

    .admin-loading h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .admin-loading p {
      margin: 0;
      color: #c9d4e7;
      font-size: 14px;
    }

    .admin-badge {
      display: inline-block;
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.35);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="admin-loading">
    <div class="admin-badge">Click Store KW Admin</div>
    <h1>Loading Dashboard...</h1>
    <p>Please wait while the content manager loads.</p>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
